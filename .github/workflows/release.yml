name: Publish to PyPI
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: xbabka01/poetry-action@33b75886ee1504a47eb3ee3050045a2bb6d01db6 # v1
        with:
          python_version: '3.13'
      - name: Poetry check
        run: poetry check --lock
      - name: Install dependencies
        run: poetry install
      - name: Test with pytest
        run: poetry run pytest
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Get tag
        id: tag
        uses: devops-actions/action-get-tag@19f393df16cb09284484fb49bf678004bf50896a # v1.0.3
        with:
          strip_v: true
      - uses: xbabka01/poetry-action@33b75886ee1504a47eb3ee3050045a2bb6d01db6 # v1
        with:
          python_version: '3.13'
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Set version
        run: poetry version ${{ steps.tag.outputs.version }}
      - name: Build package
        run: poetry build
      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry publish --no-interaction --no-ansi
